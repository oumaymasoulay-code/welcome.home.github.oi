<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Social Rooms</title>
  <link rel="stylesheet" href="../client/style.css">
</head>
<body>
  <div class="cursor" id="cursor"></div>
  
  <div class="container">
    <header>
      <div class="logo" onclick="window.location.href='../client/index.html'">Rooms Admin</div>
      <h1>Admin Dashboard</h1>
      <button class="btn" onclick="logout()">Logout</button>
    </header>

    <div class="room-grid">
      <div class="card">
        <h3>All Rooms</h3>
        <table id="rooms-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Created By</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="card">
        <h3>All Users</h3>
        <table id="users-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Email</th>
              <th>Admin</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="../socket.io/socket.io.js"></script>
  <script src="../client/app.js"></script>
  <script>
    const token = localStorage.getItem('token');
    if (!token) {
      alert('Admin login required');
      window.location.href = '../client/index.html';
    }

    document.addEventListener('mousemove', (e) => {
      document.getElementById('cursor').style.left = e.clientX + 'px';
      document.getElementById('cursor').style.top = e.clientY + 'px';
    });

    async function loadAdminData() {
      // Rooms
      const roomsRes = await fetch('/api/admin/rooms', {
        headers: {'Authorization': `Bearer ${token}`}
      });
      if (roomsRes.ok) {
        const rooms = await roomsRes.json();
        const tbody = document.querySelector('#rooms-table tbody');
        tbody.innerHTML = rooms.map(r => `
          <tr>
            <td>${r.id}</td>
            <td>${r.name}</td>
            <td>${r.created_by}</td>
            <td><button class="btn" onclick="deleteRoom(${r.id})" style="padding: 5px 10px;">Delete</button></td>
          </tr>
        `).join('');
      }

      // Users (add /api/admin/users route later)
      const usersRes = await fetch('/api/admin/users', {
        headers: {'Authorization': `Bearer ${token}`}
      });
      if (usersRes.ok) {
        const users = await usersRes.json();
        const utbody = document.querySelector('#users-table tbody');
        utbody.innerHTML = users.map(u => `
          <tr>
            <td>${u.id}</td>
            <td>${u.email}</td>
            <td>${u.is_admin ? 'Yes' : 'No'}</td>
            <td><button class="btn" onclick="kickUser(${u.id})" style="padding: 5px 10px;">Kick</button></td>
          </tr>
        `).join('');
      }
    }

    // Temp delete
    window.deleteRoom = (id) => {
      if (confirm('Delete room?')) {
        // Add API
        loadAdminData();
      }
    };

    window.kickUser = (id) => {
      if (confirm('Kick user?')) {
        // Add API
        loadAdminData();
      }
    };

    window.logout = () => {
      localStorage.removeItem('token');
      window.location.href = '../client/index.html';
    };

    loadAdminData();
  </script>
</body>
</html>
